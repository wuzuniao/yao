[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: 单元测试（独立函数/组件/服务，不依赖外部资源）
    integration: 集成测试（API接口、模块交互，需测试数据库）
    e2e: 端到端测试（完整用户流程，需测试数据库）
addopts = --cov=app --cov-report=term-missing --cov-report=html --cov-config=tests/.coveragerc -q
